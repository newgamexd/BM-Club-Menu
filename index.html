<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<title>BM Club Menu</title>

<style>
body{
    margin:0;
    background:transparent;
    font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Helvetica,Arial,sans-serif;
}

.bm-container{
    width:202px;
}

.bm-card{
    background:linear-gradient(180deg,#2b0000,#120000);
    border:1px solid rgba(255,70,70,.35);
    border-top:2px solid rgba(255,90,90,.8);
    box-shadow:0 0 12px rgba(255,0,0,.15);
    border-radius:18px;
    padding:12px;
}

.bm-button{
    display:block;
    width:100%;
    box-sizing:border-box;
    text-decoration:none;
    color:#fff;
    text-align:center;
    padding:10px 12px;
    margin-bottom:8px;

    background:linear-gradient(180deg,#3a0000,#1a0000);
    border:1px solid rgba(255,70,70,.35);
    border-radius:12px;

    transition:all .25s ease;
    font-weight:600;
}

.bm-button:last-child{
    margin-bottom:0;
}

.bm-button:hover{
    background:linear-gradient(180deg,#4d0000,#220000);
    border-color:rgba(255,90,90,.8);
    box-shadow:0 0 12px rgba(255,60,60,.4);
    transform:translateY(-1px);
}

.icon{
    color:#ff6666;
    margin-right:6px;
}
</style>
</head>

<body>

<div class="bm-container">
    <div class="bm-card">

        <a class="bm-button"
           href="https://www.chess.com/clubs/forum/view/rule-club"
           target="_blank">
            <span class="icon">📜</span>Quy Định CLB
        </a>

        <a class="bm-button"
           href="https://www.chess.com/clubs/forum/view/forum-quang-cao-2"
           target="_blank">
            <span class="icon">📢</span>Forum Quảng Cáo
        </a>

        <a class="bm-button"
           href="https://www.chess.com/clubs/events/blunder-master-vn"
           target="_blank">
            <span class="icon">🎯</span>Sự Kiện CLB
        </a>

    </div>
</div>

</body>
</html>
