<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<title>BM Club Menu</title>

<style>
body{
    margin:0;
    background:transparent;
    overflow:hidden;
    font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Helvetica,Arial,sans-serif;
}

.bm-container{
    width:202px;
}

.bm-card{
    width:202px;
    box-sizing:border-box;

    background:linear-gradient(180deg,#2b0000,#120000);
    color:#ffffff;

    border-radius:18px;
    padding:12px;

    border:1px solid rgba(255,70,70,.35);
    border-top:2px solid rgba(255,90,90,.8);

    box-shadow:0 0 12px rgba(255,0,0,.15);
}

.bm-button{
    display:block;
    width:100%;
    box-sizing:border-box;

    text-decoration:none;
    text-align:center;

    padding:10px 12px;
    margin-bottom:8px;

    color:#ffffff;
    font-weight:600;

    background:linear-gradient(180deg,#3a0000,#1a0000);

    border:1px solid rgba(255,120,120,.8);
    border-top:2px solid rgba(255,180,180,1);

    border-radius:12px;

    box-shadow:
        0 0 8px rgba(255,80,80,.4),
        inset 0 0 4px rgba(255,255,255,.08);

    transition:all .25s ease;
}

.bm-button:last-child{
    margin-bottom:0;
}

.bm-button:hover{
    background:linear-gradient(180deg,#4d0000,#220000);

    border-color:rgba(255,180,180,1);

    box-shadow:
        0 0 15px rgba(255,90,90,.8),
        0 0 25px rgba(255,60,60,.4);

    transform:translateY(-1px);
}

.icon{
    color:#ff6666;
    margin-right:6px;
}
</style>
</head>

<body>

<div class="bm-container">
    <div class="bm-card">

        <a class="bm-button"
           href="https://www.chess.com/clubs/forum/view/rule-club"
           target="_blank">
            <span class="icon">📜</span>Quy Định CLB
        </a>

        <a class="bm-button"
           href="https://www.chess.com/clubs/forum/view/forum-quang-cao-2"
           target="_blank">
            <span class="icon">📢</span>Forum Quảng Cáo
        </a>

        <a class="bm-button"
           href="https://www.chess.com/clubs/events/blunder-master-vn"
           target="_blank">
            <span class="icon">🎯</span>Sự Kiện CLB
        </a>

    </div>
</div>

</body>
</html>
